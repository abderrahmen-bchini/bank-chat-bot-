<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wifak Assistant — Internal Bank Chatbot</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Raleway:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>

  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand" aria-label="Wifak Bank branding">
          <img class="brand-logo" src="{{ url_for('static', filename='img/wifak-logo.png') }}" alt="Wifak Bank logo" />
        </div>

        <div class="divider"></div>

        <div class="sidebar-actions" aria-label="Conversations">
          <button id="newChatBtn" class="new-chat-btn" type="button">+ New chat</button>
        </div>

        <div class="chat-list" id="chatList" aria-label="Conversation history"></div>

        <div class="sidebar-footer">v1.0 — Wifak Bank © 2025</div>
      </aside>

      <main class="chat">
        <header class="topbar">
          <div class="topbar-left">
            <div class="topbar-title">Wifak Assistant</div>
            <div class="presence" aria-label="Online">
              <span class="online-dot"></span>
              <span class="online-text">Online</span>
            </div>
          </div>

          <div class="topbar-right">
            <a class="topbar-link" href="/admin">Admin</a>
            <a class="topbar-link" href="/logout">Logout</a>

            <label class="control" for="langSelect">Language</label>
            <select id="langSelect" class="select" aria-label="Language selector">
              <option value="en" selected>English</option>
              <option value="fr">Français</option>
              <option value="ar">العربية</option>
            </select>
          </div>
        </header>

        <section class="history" id="chatHistory" aria-label="Chat message history">
          <div class="message bot new" id="welcomeMessage">
            <div class="avatar bot" aria-hidden="true">W</div>
            <div class="bubble">
              <div class="meta">
                <span class="name">Wifak Assistant</span>
                <span class="time">{{ now }}</span>
              </div>
              <div class="content" id="welcomeContent">
                <p><strong>Suggestions:</strong> VPN access, leave policy, payroll/payslip, KYC/AML, onboarding checklist.</p>
                <p class="muted">Your previous conversations are available in the left sidebar.</p>
              </div>
            </div>
          </div>

          <div class="message bot typing" id="typingIndicator" hidden>
            <div class="avatar bot" aria-hidden="true">W</div>
            <div class="bubble">
              <div class="meta">
                <span class="name">Wifak Assistant</span>
                <span class="time">…</span>
              </div>
              <div class="content">
                <div class="typing-dots" aria-label="Bot is typing">
                  <span></span><span></span><span></span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <footer class="composer">
          <input
            id="messageInput"
            class="input"
            type="text"
            placeholder="Type a message... (e.g., VPN, leave request, KYC)"
            autocomplete="off"
          />
          <button id="sendBtn" class="send" type="button">Send</button>
        </footer>
      </main>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
  </body>
</html>
