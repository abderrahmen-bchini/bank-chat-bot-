# Docker Compose for Bank Chatbot

version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-chatbot-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://bankuser:bankpass@postgres:5432/bankchatbot
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      - postgres
      - qdrant
      - ollama
    networks:
      - chatbot-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank-chatbot-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - chatbot-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bank-chatbot-postgres
    environment:
      - POSTGRES_USER=bankuser
      - POSTGRES_PASSWORD=bankpass
      - POSTGRES_DB=bankchatbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - chatbot-network
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bank-chatbot-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT_API_KEY=default_key
    networks:
      - chatbot-network
    restart: unless-stopped

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: bank-chatbot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - chatbot-network
    restart: unless-stopped
    # Pull a model on startup (optional)
    # command: ollama pull mistral

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:

networks:
  chatbot-network:
    driver: bridge
