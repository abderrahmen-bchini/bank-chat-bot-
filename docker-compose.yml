services : 
  app : 
    build : . 
    depends_on : 
      - qdrant 
    command: python src/web_app.py
    stdin_open: true
    tty: true
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/rag_app/data
    ports:
      - 5000:5000
  qdrant : 
    image : qdrant/qdrant 
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports : 
      - 6333:6333 

